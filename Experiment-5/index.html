<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Salary Management System</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .container{
            width: 700px;
            margin: 40px auto;
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 0px 10px gray;
            text-align: center;
        }

        h2{
            margin-bottom: 25px;
        }

        input{
            width: 250px;
            padding: 10px;
            margin: 8px;
            border: 1px solid gray;
        }

        button{
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 15px;
            margin: 5px;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover{
            background-color: green;
        }

        #output{
            margin-top: 25px;
            text-align: left;
            font-size: 18px;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>Employee Salary Management System</h2>

    <input type="text" id="name" placeholder="Employee Name">
    <br>

    <input type="text" id="id" placeholder="Employee ID">
    <br>

    <input type="number" id="salary" placeholder="Salary">
    <br>

    <input type="text" id="department" placeholder="Department">
    <br>

    <button onclick="addEmployee()">Add Employee</button>

    <br><br>

    <button onclick="displayEmployees()">Display All</button>

    <button onclick="salaryGreater()">Salary > 50000</button>

    <button onclick="totalSalary()">Total Salary</button>

    <button onclick="averageSalary()">Average Salary</button>

    <button onclick="countDepartment()">Count by Department</button>

    <div id="output"></div>

</div>

<script>

let employees = [];

function addEmployee(){

    let emp = {

        name : document.getElementById("name").value,

        id : document.getElementById("id").value,

        salary : parseInt(document.getElementById("salary").value),

        department : document.getElementById("department").value
    };

    employees.push(emp);

    alert("Employee Added Successfully!");

}

function displayEmployees(){

    let text = "<h3>All Employees</h3>";

    employees.forEach(function(emp){

        text +=
        "Name: " + emp.name +
        " | ID: " + emp.id +
        " | Salary: ₹" + emp.salary +
        " | Dept: " + emp.department +
        "<br>";
    });

    document.getElementById("output").innerHTML = text;
}

function salaryGreater(){

    let filtered = employees.filter(function(emp){

        return emp.salary > 50000;
    });

    let text = "<h3>Employees with Salary > ₹50,000</h3>";

    filtered.forEach(function(emp){

        text +=
        "Name: " + emp.name +
        " | Salary: ₹" + emp.salary +
        "<br>";
    });

    document.getElementById("output").innerHTML = text;
}

function totalSalary(){

    let total = 0;

    employees.forEach(function(emp){

        total += emp.salary;
    });

    document.getElementById("output").innerHTML =
    "<h3>Total Salary Payout: ₹" + total + "</h3>";
}

function averageSalary(){

    let total = 0;

    employees.forEach(function(emp){

        total += emp.salary;
    });

    let avg = total / employees.length;

    document.getElementById("output").innerHTML =
    "<h3>Average Salary: ₹" + avg.toFixed(2) + "</h3>";
}

function countDepartment(){

    let dept = prompt("Enter Department Name");

    let count = 0;

    employees.forEach(function(emp){

        if(emp.department == dept){

            count++;
        }
    });

    document.getElementById("output").innerHTML =
    "<h3>Employees in " + dept + " : " + count + "</h3>";
}

</script>

</body>
</html>
