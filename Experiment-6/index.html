<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DOM Manipulation</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #d9f3ef;
        }

        .container{
            width: 700px;
            margin: 50px auto;
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 0px 10px gray;
            text-align: center;
        }

        h1{
            margin-bottom: 20px;
        }

        input{
            width: 300px;
            padding: 10px;
            margin-bottom: 20px;
        }

        button{
            background-color: #0d6efd;
            color: white;
            border: none;
            padding: 10px 15px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: blue;
        }

        p{
            margin-top: 25px;
            font-size: 20px;
        }

    </style>

</head>

<body>

<div class="container">

    <h1 id="heading">
        Welcome to JavaScript Lab
    </h1>

    <input type="text" id="textInput"
    placeholder="Enter new heading text">

    <br>

    <button onclick="changeHeading()">
        Change Heading
    </button>

    <button onclick="changeBackground()">
        Change Background
    </button>

    <button onclick="increaseFont()">
        Increase Font Size
    </button>

    <button onclick="toggleParagraph()">
        Show/Hide Paragraph
    </button>

    <button onclick="resetPage()">
        Reset
    </button>

    <p id="para">
        This is a sample paragraph.
        JavaScript events can dynamically change content.
    </p>

</div>

<script>

function changeHeading(){

    let text = document.getElementById("textInput").value;

    document.getElementById("heading").innerHTML = text;
}

function changeBackground(){

    document.body.style.backgroundColor = "#b57b7b";
}

function increaseFont(){

    document.getElementById("heading").style.fontSize = "45px";
}

function toggleParagraph(){

    let para = document.getElementById("para");

    if(para.style.display == "none"){

        para.style.display = "block";
    }

    else{

        para.style.display = "none";
    }
}

function resetPage(){

    location.reload();
}

</script>

</body>
</html>
