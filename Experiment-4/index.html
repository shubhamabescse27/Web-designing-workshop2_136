<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Calculator</title>

    <style>
        body{
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
            padding-top: 50px;
        }

        .container{
            width: 400px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input{
            width: 80%;
            padding: 10px;
            margin: 10px;
        }

        button{
            background-color: blue;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        h2{
            margin-bottom: 20px;
        }

        #result{
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Student Result Calculator</h2>

        <input type="number" id="subjects"
               placeholder="Enter Number of Subjects">

        <br>

        <button onclick="calculateResult()">
            Calculate Result
        </button>

        <div id="result"></div>

    </div>

<script>

function calculateResult(){

    let n = document.getElementById("subjects").value;

    let total = 0;

    for(let i=1; i<=n; i++){

        let marks = parseInt(prompt("Enter marks for Subject " + i));

        total = total + marks;
    }

    let average = total / n;

    let grade = "";

    if(average >= 75){
        grade = "A";
    }
    else if(average >= 60){
        grade = "B";
    }
    else if(average >= 40){
        grade = "C";
    }
    else{
        grade = "Fail";
    }

    let resultText = "";

    if(average >= 40){
        resultText = "PASS";
    }
    else{
        resultText = "FAIL";
    }

    document.getElementById("result").innerHTML =
    "Total Marks: " + total + "<br>" +
    "Average Marks: " + average.toFixed(2) + "<br>" +
    "Grade: " + grade + "<br>" +
    "Result: " + resultText;
}

</script>

</body>
</html>
